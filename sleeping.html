<!DOCTYPE html>
<html>
<head>
  <title>Page 3</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial;
      position: relative;

      background-image: url("https://i.pinimg.com/1200x/fd/c8/51/fdc8515c36eba6707cbdbcf3377353ed.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }


    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.55);
      z-index: 0;
    }

    .text-container {
      position: absolute;
      top: 90px;
      left: 60px;
      color: white;
      text-shadow: 2px 2px 6px black;
      z-index: 1;
    }

    .main-title {
      font-size: 110px;
      font-weight: bold;
      margin: 0;
    }

    .sub-title {
      font-size: 22px;
      margin-top: 10px;
      max-width: 420px;
      line-height: 1.4;
    }

    
    .log-out-btn {
      position: absolute;
      bottom: 40px;
      left: 40px;
      padding: 12px 35px;
      font-size: 18px;
      background-color: red;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s ease;
      z-index: 1;
      text-decoration: none;
    }

    .log-out-btn:hover {
      background-color: darkred;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="text-container">
    <h1 class="main-title">I'm sleepy now</h1>
    <p class="sub-title">
      This really tired me out. <br>Let's sleep and then play again later.
    </p>
  </div>


  <a href="loginandheropage.html">
    <button class="log-out-btn">Rest with shinchan</button>
  </a>

</body>
</html>
