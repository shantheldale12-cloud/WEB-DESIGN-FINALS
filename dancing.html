<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SHINCHAN DANCE PARTY</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      background: url("https://i.pinimg.com/originals/20/df/9e/20df9e27451be427a8d5ad5d8282ca51.gif") no-repeat center center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      position: relative;
      padding-top: 40px;
    }

    marquee {
      position: fixed;
      top: 10px;
      width: 100%;
      z-index: 999;
      color: white;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background: rgba(0, 0, 0, 0.6);
    }

    .content {
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 100px;
      margin-bottom: 10px;
      text-shadow: 2px 2px 10px black;
    }

    p {
      font-size: 20px;
      margin-bottom: 20px;
    }

    .btn {
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      background: #ff4d4d;
      color: white;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff1a1a;
      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <div class="content">
    <h1>Dance the troubles away</h1>
    <p>Oopsie daisy! Shinchan dances first, learns something new next, but ends up completely misunderstanding it</p>

    <br><br><br><br><br><br>

    <audio controls loop>
      <source src="shinchan.mp3" type="audio/mpeg">
    </audio>

    <br><br>

    
    <a href="cssbasicpage01.html">
      <button class="btn">More trouble</button>
    </a>
  </div>

</body>
</html>
